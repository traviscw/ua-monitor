# UA Monitor Suppression Rules
# Lines starting with # are comments and are ignored
# No restart needed after editing — changes take effect on the next cron run
#
# -----------------------------------------------------------------------
# Rule Types
# -----------------------------------------------------------------------
#
# DEVICE:<from_num>@<domain>
#   Ignore a specific device entirely — no alerts ever
#   Example: DEVICE:200@yourdomain.com
#
# DOMAIN:<domain>
#   Ignore all devices on a specific domain
#   Example: DOMAIN:testdomain.com
#
# IP:<ip_address>
#   Ignore any change originating from a specific IP address
#   Example: IP:192.168.1.100
#
# UA:<ua_string>
#   Ignore any change where the old or new UA exactly matches this string
#   Example: UA:Mobile321
#
# UA_PREFIX:<prefix>
#   Ignore any change where the old or new UA starts with this prefix
#   Useful for apps that append build numbers or OS details
#   Example: UA_PREFIX:Mobile/1.8
#
# UA_CHANGE:<old_ua>-><new_ua>
#   Ignore a specific exact change from one UA to another
#   Example: UA_CHANGE:Web Softphone 43->Web Softphone 44
#
# UA_CHANGE_PREFIX:<old_prefix>-><new_prefix>
#   Ignore a change where both old and new UA start with the given prefixes
#   Useful for suppressing version bumps within the same app
#   Example: UA_CHANGE_PREFIX:Mobile/1.8->Mobile2/1.8
